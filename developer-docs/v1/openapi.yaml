openapi: 3.0.0
info:
  title: Surf Weather API
  version: 1.0.0
servers:
  - url: https://api.openweathermap.org/data/2.5

paths:
  /weather:
    get:
      summary: Get current weather by city name
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
          description: City name
        - in: query
          name: appid
          required: true
          schema:
            type: string
          description: API key
      responses:
        '200':
          description: Successful response
        '401':
          description: Invalid API key